        /* HUD left */
        #hud { position:absolute; top:20px; left:20px; z-index:10; display:flex; flex-direction:column; gap:12px; pointer-events:none; }
        .panel { background:var(--glass-bg); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:12px; padding:14px 18px; box-shadow:0 10px 40px rgba(0,0,0,0.5); }
        .stat { display:flex; justify-content:space-between; margin-bottom:7px; font-size:0.85rem; color:rgba(255,255,255,0.8); min-width:200px; }
        .stat:last-child { margin-bottom:0; }
        .stat span.val { font-weight:bold; color:var(--accent); }

        /* Per-hand badges top-right */
        #hand-badges { position:absolute; top:20px; right:20px; z-index:10; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .hand-badge { background:var(--glass-bg); backdrop-filter:var(--glass-blur); -webkit-backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:10px; padding:9px 14px; font-size:0.8rem; min-width:170px; display:flex; align-items:center; gap:8px; transition:border-color 0.3s; }
        .badge-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
        .badge-label { flex:1; color:rgba(255,255,255,0.7); }
        .badge-gesture { font-weight:bold; font-size:0.75rem; }

        /* Theme bar */
        #themes { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:10; display:flex; gap:8px; background:var(--glass-bg); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:30px; padding:7px; }
        .theme-btn { background:transparent; border:1px solid transparent; color:white; padding:7px 14px; border-radius:20px; cursor:pointer; transition:0.3s; font-weight:500; font-size:0.85rem; }
        .theme-btn.active { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.3); text-shadow:0 0 10px white; }

        /* Start Overlay */
        #startOverlay { position:absolute; inset:0; background:rgba(2,2,18,0.93); z-index:100; display:flex; flex-direction:column; justify-content:center; align-items:center; backdrop-filter:blur(20px); transition:opacity 0.6s ease; }
        .overlay-content { display:flex; flex-direction:column; align-items:center; text-align:center; max-width:440px; padding:0 20px; }
        .profile-ring-wrap { position:relative; width:148px; height:148px; margin-bottom:24px; }
        .profile-glow { position:absolute; inset:-5px; border-radius:50%; background:conic-gradient(from 0deg,#ff00cc,#00ffcc,#3333ff,#ff6600,#ff00cc); animation:spinGlow 3s linear infinite; z-index:0; }
        @keyframes spinGlow { to { transform:rotate(360deg); } }
        .profile-photo { position:absolute; inset:5px; width:calc(100% - 10px); height:calc(100% - 10px); border-radius:50%; object-fit:cover; z-index:1; border:3px solid #050510; }
        .overlay-title { font-size:1.65rem; font-weight:300; letter-spacing:1px; line-height:1.3; margin-bottom:6px; color:rgba(255,255,255,0.88); }
        .name-highlight { font-weight:900; font-size:2.3rem; letter-spacing:3px; background:linear-gradient(90deg,#ff00cc 0%,#00ffcc 60%,#3399ff 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; display:inline-block; }
        .overlay-sub1 { font-size:0.88rem; color:rgba(255,255,255,0.6); margin-bottom:6px; letter-spacing:4px; text-transform:uppercase; font-weight:300; }
        .overlay-emoji { font-size:1.8rem; margin-bottom:28px; animation:bounce 1.6s ease-in-out infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
        .start-btn { padding:15px 42px; font-size:1.1rem; background:linear-gradient(45deg,#ff00cc,#3333ff); border:none; color:white; border-radius:30px; cursor:pointer; box-shadow:0 0 24px rgba(255,0,204,0.55); font-weight:bold; text-transform:uppercase; letter-spacing:2px; transition:transform 0.2s,box-shadow 0.2s; }
        .start-btn:hover { transform:scale(1.06); box-shadow:0 0 36px rgba(255,0,204,0.8); }
        .overlay-hint { margin-top:14px; color:rgba(255,255,255,0.3); font-size:0.78rem; letter-spacing:1px; }
        .hidden { opacity:0; pointer-events:none; }
    </style>
</head>

const HAND_COLORS = [
    { hue: 0,   label: 'Hand 1', hex: '#ff4466' },
    { hue: 180, label: 'Hand 2', hex: '#00ffcc' },
    { hue: 270, label: 'Hand 3', hex: '#aa44ff' },
    { hue: 45,  label: 'Hand 4', hex: '#ffaa00' },
];

let currentTheme = 'Rainbow';
const themes = {
    'Rainbow':   (t, i, total) => `hsl(${(t*100 + i*(360/Math.max(total,1))) % 360},100%,60%)`,
    'Cyberpunk': (t, i, total) => (i % 2 === 0) ? '#ff003c' : '#00f0ff',
    'Lava':      (t, i, total) => `hsl(${(10+i*10)%40},100%,${50+Math.sin(t)*10}%)`,
    'Ocean':     (t, i, total) => `hsl(${180+i*20},100%,60%)`,
    'Galaxy':    (t, i, total) => `hsl(${260+Math.sin(t*2+i)*40},100%,65%)`
};

// Helper: get a distinct color for a hand index (blended with theme)
function handColor(handIdx) {
    const base = HAND_COLORS[handIdx % HAND_COLORS.length];
    if (currentTheme === 'Rainbow') return `hsl(${(base.hue + time*60) % 360},100%,60%)`;
    return themes[currentTheme](time, handIdx, 4);
}

let particles = [];
let ripples   = [];
const FINGER_TIPS = [4, 8, 12, 16, 20];

let matrixColumns = [];
const fontSize = 16;
let maxColumns = 0;

let audioCtx = null, humOsc = null, humGain = null;

const uiHands   = document.getElementById('ui-hands');
const uiFps     = document.getElementById('ui-fps');
const uiGesture = document.getElementById('ui-gesture');
const handBadgesEl = document.getElementById('hand-badges');

// ─── RESIZE ──────────────────────────────────────────────────────────────────
function resize() {
    width  = window.innerWidth;
    height = window.innerHeight;
    bgCanvas.width   = width; bgCanvas.height   = height;
    mainCanvas.width = width; mainCanvas.height = height;
    maxColumns   = Math.floor(width / fontSize);
    matrixColumns = new Array(maxColumns).fill(1).map(() => Math.random() * height / fontSize);
}
window.addEventListener('resize', resize);
resize();

// ─── THEME SWITCHER ───────────────────────────────────────────────────────────
document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', e => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentTheme = e.target.getAttribute('data-theme');
    });
});

// ─── START BUTTON ─────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('hand-badges').classList.remove('hidden');
    document.getElementById('themes').classList.remove('hidden');
    initAudio();
    initMediaPipe();
    requestAnimationFrame(renderLoop);
});

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        humOsc   = audioCtx.createOscillator();
        humGain  = audioCtx.createGain();
        humOsc.type = 'sine';
        humOsc.frequency.value = 100;
        humGain.gain.value = 0;
        humOsc.connect(humGain);
        humGain.connect(audioCtx.destination);
        humOsc.start();
    } catch(e) { console.error('Audio failed', e); }
}

function triggerZap(pitch = 800) {
    if (!audioCtx) return;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}

function updateHum(hands) {
    if (!audioCtx || !humGain) return;
    if (hands.length < 2) { humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); return; }
    const p1 = hands[0][8], p2 = hands[1][8];
    const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
    humOsc.frequency.setTargetAtTime(100 + (1 - Math.min(dist,1))*300, audioCtx.currentTime, 0.1);
    humGain.gain.setTargetAtTime(0.05 + (1 - Math.min(dist,1))*0.15, audioCtx.currentTime, 0.1);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function getDist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
function mapToCanvas(p)  { return { x: p.x * width, y: p.y * height }; }

// ─── GESTURES ─────────────────────────────────────────────────────────────────
let lastPinchState = [false, false, false, false];
let handGestureLabels = ['None','None','None','None'];

function detectGestures() {
    currentHands.forEach((hand, idx) => {
        const thumb = hand[4], index = hand[8];
        const dist  = getDist(thumb, index);
        const isPinching = dist < 0.05;

        if (isPinching && !lastPinchState[idx]) {
            const mid = { x:(thumb.x+index.x)/2, y:(thumb.y+index.y)/2 };
            createShockwave(mapToCanvas(mid), handColor(idx));
            triggerZap(600 + idx * 100);
            handGestureLabels[idx] = 'PINCH! ✨';
            uiGesture.innerText = `Hand ${idx+1} PINCH!`;
        }
        lastPinchState[idx] = isPinching;

        if (!isPinching) {
            const spread = getDist(hand[8], hand[20]);
            const spreadPct = Math.min(Math.round(spread * 300), 100);
            if (spreadPct > 50) {
                handGestureLabels[idx] = 'Open 🖐';
            } else {
                // Check if all fingers curled = fist
                const fingersCurled = [8,12,16,20].every(tip => hand[tip].y > hand[tip-2].y);
                handGestureLabels[idx] = fingersCurled ? 'Fist ✊' : 'Partial ✌️';
            }
        }
    });

    // Clear labels for hands that are gone
    for (let i = currentHands.length; i < 4; i++) {
        handGestureLabels[i] = 'None';
        lastPinchState[i] = false;
    }
}

// ─── UPDATE HAND BADGES ────────────────────────────────────────────────────────
function updateHandBadges() {
    handBadgesEl.innerHTML = '';
    currentHands.forEach((hand, idx) => {
        const col  = HAND_COLORS[idx % HAND_COLORS.length];
        const div  = document.createElement('div');
        div.className = 'hand-badge';
        div.style.borderColor = col.hex + '55';
        div.innerHTML = `
            <span class="badge-dot" style="background:${col.hex}; box-shadow:0 0 8px ${col.hex};"></span>
            <span class="badge-label">${col.label}</span>
            <span class="badge-gesture" style="color:${col.hex};">${handGestureLabels[idx]}</span>
        `;
        handBadgesEl.appendChild(div);
    });
}

// ─── PARTICLES & RIPPLES ──────────────────────────────────────────────────────
function createParticles(pos, color, count = 2) {
    for (let i = 0; i < count; i++) {
        particles.push({ x:pos.x, y:pos.y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8, life:1.0, color, size:Math.random()*3+1 });
    }
}

function createShockwave(pos, color) {
    ripples.push({ x:pos.x, y:pos.y, radius:0, maxRadius:150+Math.random()*100, life:1.0, color });
}

// ─── BACKGROUND (Matrix Rain) ─────────────────────────────────────────────────
function drawBackground() {
    bgCtx.globalCompositeOperation = 'destination-out';
    bgCtx.fillStyle = `rgba(0,0,0,${0.15 + Math.min(handVelocities*10, 0.5)})`;
    bgCtx.fillRect(0, 0, width, height);
    bgCtx.globalCompositeOperation = 'source-over';
    bgCtx.fillStyle = themes[currentTheme](time, 1, 1);
    bgCtx.font = fontSize + 'px monospace';
    const speedMult = 1 + handVelocities * 100;
    for (let i = 0; i < matrixColumns.length; i++) {
        if (Math.random() > 0.95) {
            bgCtx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*fontSize, matrixColumns[i]*fontSize);
        }
        matrixColumns[i] += Math.random() * speedMult;
        if (matrixColumns[i] * fontSize > height && Math.random() > 0.9) matrixColumns[i] = 0;
    }
}

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
function updatePhysics() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.02;
        if (p.life <= 0) { particles.splice(i,1); continue; }
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill();
    }
    for (let i = ripples.length - 1; i >= 0; i--) {
        const r = ripples[i];
        r.radius += (r.maxRadius - r.radius) * 0.1; r.life -= 0.03;
        if (r.life <= 0) { ripples.splice(i,1); continue; }
        ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
        ctx.strokeStyle = r.color; ctx.lineWidth = 4*r.life; ctx.globalAlpha = r.life; ctx.stroke();
    }
    ctx.globalAlpha = 1.0;
}

// ─── DRAW SINGLE HAND ─────────────────────────────────────────────────────────
function drawHand(hand, handIdx) {
    const col = handColor(handIdx);

    // Skeleton
    drawConnectors(ctx, hand, HAND_CONNECTIONS, { color: col, lineWidth: 2 });

    // Fingertip glow + particles
    ctx.shadowBlur = 18; ctx.shadowColor = col;
    FINGER_TIPS.forEach((tipIdx, i) => {
        const pt     = mapToCanvas(hand[tipIdx]);
        const tipCol = handColor(handIdx);
        ctx.beginPath(); ctx.arc(pt.x, pt.y, 5, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
        if (Math.random() > 0.55) createParticles(pt, tipCol, 1);
    });
    ctx.shadowBlur = 0;

    // Palm circle indicator
    const palm = mapToCanvas(hand[0]);
    ctx.beginPath(); ctx.arc(palm.x, palm.y, 10, 0, Math.PI*2);
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1.0;
}

// ─── DRAW MULTI-HAND CONNECTIONS ──────────────────────────────────────────────
function drawCrossHandConnections() {
    // Connect every pair of hands
    for (let a = 0; a < currentHands.length; a++) {
        for (let b = a + 1; b < currentHands.length; b++) {
            const h1 = currentHands[a];
            const h2 = currentHands[b];
            const colA = handColor(a);
            const colB = handColor(b);

            FINGER_TIPS.forEach((tipIdx, i) => {
                const pt1 = mapToCanvas(h1[tipIdx]);
                const pt2 = mapToCanvas(h2[tipIdx]);
                const dist = getDist(pt1, pt2);

                // Lightning arc when close
                if (dist < 200 && Math.random() > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(pt1.x, pt1.y);
                    const midX = (pt1.x+pt2.x)/2 + (Math.random()-0.5)*60;
                    const midY = (pt1.y+pt2.y)/2 + (Math.random()-0.5)*60;
                    ctx.lineTo(midX, midY); ctx.lineTo(pt2.x, pt2.y);
                    ctx.strokeStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = colA;
                    ctx.lineWidth = 2; ctx.stroke();
                }

                // Gradient beam
                ctx.beginPath(); ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y);
                const grad = ctx.createLinearGradient(pt1.x, pt1.y, pt2.x, pt2.y);
                grad.addColorStop(0, colA);
                grad.addColorStop(1, colB);
                ctx.strokeStyle = grad; ctx.lineWidth = 3;
                ctx.shadowBlur = 10; ctx.shadowColor = colA; ctx.stroke(); ctx.shadowBlur = 0;
            });
        }
    }

    // Mandala when 2+ hands present: connect all tips in a star
    if (currentHands.length >= 2) {
        let allTips = [];
        currentHands.forEach(h => FINGER_TIPS.forEach(t => allTips.push(mapToCanvas(h[t]))));
        const cx = allTips.reduce((s,p) => s+p.x, 0) / allTips.length;
        const cy = allTips.reduce((s,p) => s+p.y, 0) / allTips.length;
        const n  = allTips.length;
        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(time * 0.4);
        ctx.beginPath();
        for (let i = 0; i < n; i++) {
            const t1 = { x: allTips[i].x-cx, y: allTips[i].y-cy };
            const t2 = { x: allTips[(i+3)%n].x-cx, y: allTips[(i+3)%n].y-cy };
            ctx.moveTo(t1.x, t1.y); ctx.lineTo(t2.x, t2.y);
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.restore();
    }
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
function renderLoop(timestamp) {
    requestAnimationFrame(renderLoop);
    const dt = (timestamp - lastTime) / 1000; lastTime = timestamp; time += dt;
    framesThisSecond++;
    if (timestamp > lastFpsTime + 1000) { uiFps.innerText = framesThisSecond; framesThisSecond = 0; lastFpsTime = timestamp; }

    drawBackground();

    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'screen';

    updatePhysics();

    if (currentHands.length > 0) {
        currentHands.forEach((hand, idx) => drawHand(hand, idx));
        if (currentHands.length >= 2) drawCrossHandConnections();
        detectGestures();
        updateHandBadges();
    } else {
        handBadgesEl.innerHTML = '';
    }

    ctx.globalCompositeOperation = 'source-over';
}

// ─── MEDIAPIPE ────────────────────────────────────────────────────────────────
function initMediaPipe() {
    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });

    hands.setOptions({
        maxNumHands: 10,              // ← up from 2 to 4
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    hands.onResults(results => {
        if (!audioCtx) return;
        const detected = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
        uiHands.innerText = detected;

        // velocity on first hand
        if (currentHands.length > 0 && detected > 0) {
            const oldP = currentHands[0][8];
            const newP = results.multiHandLandmarks[0][8];
            if (oldP && newP) handVelocities = getDist(oldP, newP);
        } else { handVelocities = 0; }

        currentHands = results.multiHandLandmarks || [];
        updateHum(currentHands);
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 1280, height: 720, facingMode: 'user'
    });
    camera.start();
}
</script>
